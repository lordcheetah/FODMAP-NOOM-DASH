# Netlify deploy config. (Vercel works too — it auto-detects Vite; add the same
# SPA rewrite via vercel.json if you go that route.)
#
# Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in the Netlify site's
# environment variables (Site settings -> Environment variables).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # These VITE_* values are INTENDED to be in the client bundle (the anon key is
  # public — every table is guarded by RLS). Netlify's secrets scanner otherwise
  # sees the anon key in dist/ and FAILS the build, leaving the old "not
  # configured" bundle live. Tell it these keys are safe to appear in the output.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# SPA fallback so client-side routes (e.g. /meals, /exercise) work on reload.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Let the service worker update promptly rather than being cached.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
